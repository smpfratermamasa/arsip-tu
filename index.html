<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARSIP DIGITAL - FRATER MAMASA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/all/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #f3f4f6; 
        }
        .tab-aktif { 
            background: #1e3a8a !important; 
            color: white !important; 
        }
        /* Efek loading saat data sedang diambil */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            border-radius: 4px;
        }
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-blue-900 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <i class="fas fa-archive text-blue-300"></i>
            <h1 class="font-bold tracking-tight text-sm uppercase">Arsip Digital SMP Frater</h1>
        </div>
        <div id="status" class="text-[9px] font-bold bg-orange-500 px-2 py-1 rounded-full uppercase">MENGHUBUNGKAN...</div>
    </nav>

    <div class="max-w-4xl mx-auto p-4">
        <div id="error-display" class="hidden mb-4 p-4 bg-red-100 border-l-4 border-red-500 text-red-700 text-xs rounded shadow-sm">
            <p class="font-bold mb-1">Terjadi Kesalahan:</p>
            <p id="error-message"></p>
        </div>

        <div class="flex flex-nowrap overflow-x-auto gap-2 mb-6 pb-2 no-scrollbar" id="menu-tab">
            <button data-cat="surat-masuk" class="btn-tab tab-aktif whitespace-nowrap px-4 py-2 rounded-full text-sm font-medium shadow-sm border border-transparent">Surat Masuk</button>
            <button data-cat="surat-keluar" class="btn-tab bg-white whitespace-nowrap px-4 py-2 rounded-full text-sm font-medium shadow-sm border border-gray-200">Surat Keluar</button>
            <button data-cat="sk" class="btn-tab bg-white whitespace-nowrap px-4 py-2 rounded-full text-sm font-medium shadow-sm border border-gray-200">Surat Keputusan</button>
            <button data-cat="kepegawaian" class="btn-tab bg-white whitespace-nowrap px-4 py-2 rounded-full text-sm font-medium shadow-sm border border-gray-200">Kepegawaian</button>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 text-[11px] uppercase font-bold text-gray-500 tracking-wider">
                        <tr>
                            <th class="p-4 border-b">Tanggal</th>
                            <th class="p-4 border-b">Judul Dokumen</th>
                            <th class="p-4 border-b text-center">Buka</th>
                        </tr>
                    </thead>
                    <tbody id="isi-tabel">
                        <tr>
                            <td class="p-4 border-b"><div class="skeleton h-4 w-20"></div></td>
                            <td class="p-4 border-b"><div class="skeleton h-4 w-full"></div></td>
                            <td class="p-4 border-b text-center"><div class="skeleton h-8 w-8 mx-auto rounded-full"></div></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js';
        import { getFirestore, collection, onSnapshot, query } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js';
        import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDbP9tX_U3eWKnKUoo6Ukofdi2rlOrxpuM",
            authDomain: "arsip-digital-baru.firebaseapp.com",
            projectId: "arsip-digital-baru",
            storageBucket: "arsip-digital-baru.appspot.com", // Disederhanakan agar lebih stabil
            messagingSenderId: "789604072965",
            appId: "1:789604072965:web:42a2c6be8ac330010a666c",
            measurementId: "G-CQ3L8M96DX"
        };

        const statusEl = document.getElementById('status');
        const errorDisplay = document.getElementById('error-display');
        const errorMessage = document.getElementById('error-message');
        const tabelEl = document.getElementById('isi-tabel');
        
        let dataSemua = [];
        let kategoriSekarang = 'surat-masuk';

        function showError(msg) {
            errorDisplay.classList.remove('hidden');
            errorMessage.innerText = msg;
            statusEl.innerText = "ERROR";
            statusEl.className = "text-[9px] font-bold bg-red-600 px-2 py-1 rounded-full uppercase";
        }

        function renderData() {
            const hasilFilter = dataSemua.filter(item => item.category === kategoriSekarang);
            
            if (hasilFilter.length === 0) {
                tabelEl.innerHTML = '<tr><td colspan="3" class="p-10 text-center text-gray-400">Tidak ada data di kategori ini.</td></tr>';
                return;
            }

            tabelEl.innerHTML = hasilFilter.map(item => `
                <tr class="border-b hover:bg-blue-50 transition-colors">
                    <td class="p-4 text-[12px] text-gray-500">${item.date || '-'}</td>
                    <td class="p-4 text-sm font-semibold text-gray-700">${item.title}</td>
                    <td class="p-4 text-center">
                        <a href="${item.link}" target="_blank" class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-blue-100 text-blue-600 hover:bg-blue-600 hover:text-white transition-all">
                            <i class="fab fa-google-drive"></i>
                        </a>
                    </td>
                </tr>`).join('');
        }

        async function initApp() {
            try {
                const app = initializeApp(firebaseConfig);
                const db = getFirestore(app);
                const auth = getAuth(app);

                await signInAnonymously(auth);
                
                const q = query(collection(db, 'arsip'));
                onSnapshot(q, (snapshot) => {
                    dataSemua = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    statusEl.innerText = "ONLINE";
                    statusEl.className = "text-[9px] font-bold bg-green-500 px-2 py-1 rounded-full uppercase";
                    renderData();
                }, (err) => {
                    showError("Masalah Database: " + err.message);
                });

            } catch (err) {
                showError("Gagal Terhubung: " + err.message);
            }
        }

        initApp();

        document.getElementById('menu-tab').addEventListener('click', (e) => {
            const btn = e.target.closest('.btn-tab');
            if (!btn) return;

            document.querySelectorAll('.btn-tab').forEach(b => {
                b.classList.remove('tab-aktif');
                b.classList.add('bg-white');
            });

            btn.classList.add('tab-aktif');
            btn.classList.remove('bg-white');
            
            kategoriSekarang = btn.dataset.cat;
            renderData();
        });
    </script>
</body>
</html>
