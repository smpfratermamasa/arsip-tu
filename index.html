<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARSIP DIGITAL - TATA USAHA SMP FRATER MAMASA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            font-family: sans-serif; 
            margin: 0;
            min-height: 100vh;
            background-color: #0f172a;
        }

        /* Latar Belakang Gambar Sekolah */
        .bg-sekolah {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: linear-gradient(rgba(15, 23, 42, 0.5), rgba(15, 23, 42, 0.5)), 
                              url('https://lh3.googleusercontent.com/u/0/d/1yLTwIT6zhF9PcyTau-Sos5K7Sh6b4-NN=w1600');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .tab-aktif { background: #1e3a8a !important; color: white !important; border-color: #3b82f6 !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .group-header { background-color: rgba(241, 245, 249, 0.98); font-weight: bold; color: #1e3a8a; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .nav-glass {
            background: rgba(30, 58, 138, 0.92);
            backdrop-filter: blur(10px);
        }

        .text-shadow {
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* Gaya judul yang dapat diklik */
        .judul-link {
            cursor: pointer;
            transition: color 0.2s;
        }
        .judul-link:hover {
            color: #2563eb;
            text-decoration: underline;
        }
    </style>
</head>
<body class="pb-20">

    <div class="bg-sekolah"></div>

    <nav class="nav-glass text-white p-4 shadow-xl flex justify-between items-center sticky top-0 z-50 border-b border-blue-700/50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center overflow-hidden border-2 border-blue-400 shadow-md">
                <img src="https://lh3.googleusercontent.com/u/0/d/1nrUqzIZP0zTDVH3axW6sBFP2Z_NDoDfB=s100" 
                     alt="Logo Sekolah" 
                     class="w-full h-full object-contain"
                     onerror="this.src='https://docs.google.com/uc?export=download&id=1nrUqzIZP0zTDVH3axW6sBFP2Z_NDoDfB'">
            </div>
            
            <div class="flex flex-col leading-tight">
                <h1 class="font-bold tracking-tight text-xs uppercase text-blue-50 text-shadow">Arsip Digital Tata Usaha</h1>
                <h2 class="font-extrabold tracking-widest text-[10px] text-blue-300 uppercase text-shadow">SMP Frater Mamasa</h2>
            </div>
        </div>
        <div id="status" class="text-[9px] font-bold bg-orange-500 px-2 py-1 rounded-full uppercase shadow-sm">MENGHUBUNGKAN...</div>
    </nav>

    <div class="max-w-4xl mx-auto p-4">
        <div class="flex flex-nowrap overflow-x-auto gap-2 mb-6 pb-2 no-scrollbar" id="menu-tab">
            <button data-cat="surat-masuk" class="btn-tab tab-aktif whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-bold shadow-lg border-2 border-transparent transition-all">Surat Masuk</button>
            <button data-cat="surat-keluar" class="btn-tab bg-white whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-bold shadow-md border-2 border-gray-100 transition-all hover:bg-gray-50">Surat Keluar</button>
            <button data-cat="sk" class="btn-tab bg-white whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-bold shadow-md border-2 border-gray-100 transition-all hover:bg-gray-50">Surat Keputusan</button>
            <button data-cat="kepegawaian" class="btn-tab bg-white whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-bold shadow-md border-2 border-gray-100 transition-all hover:bg-gray-50">Kepegawaian</button>
            <button data-cat="absen" class="btn-tab bg-white whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-bold shadow-md border-2 border-gray-100 transition-all hover:bg-gray-50">Rekap Absen Pegawai</button>
        </div>

        <div id="search-container" class="mb-6">
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-4 text-gray-400"></i>
                <input type="text" id="searchTerm" placeholder="Cari arsip atau nama..." class="w-full pl-12 pr-4 py-3.5 rounded-2xl border-none shadow-2xl focus:ring-4 focus:ring-blue-500/50 outline-none glass-card font-medium text-gray-800">
            </div>
        </div>

        <div class="glass-card rounded-3xl shadow-2xl overflow-hidden border border-white/50">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 text-[11px] uppercase font-bold text-gray-600 tracking-widest border-b border-gray-200">
                        <tr id="head-tabel">
                            <th class="p-5 border-b">Detail Berkas (Klik Judul untuk Buka)</th>
                            <th class="p-5 border-b">Tgl</th>
                            <th class="p-5 border-b text-center">Hapus</th>
                        </tr>
                    </thead>
                    <tbody id="isi-tabel"></tbody>
                </table>
            </div>
        </div>
    </div>

    <button onclick="bukaModal()" class="fixed bottom-8 right-8 bg-blue-600 text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center hover:bg-blue-700 hover:scale-110 active:scale-95 transition-all z-40 border-4 border-white">
        <i class="fas fa-plus fa-lg"></i>
    </button>

    <div id="modalInput" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-md p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-blue-900 flex items-center gap-3">
                    <i class="fas fa-folder-plus text-blue-600"></i> Tambah Arsip
                </h2>
                <button onclick="tutupModal()" class="text-gray-400 hover:text-red-500 transition-colors"><i class="fas fa-times fa-lg"></i></button>
            </div>
            <div class="space-y-4 text-sm">
                <div>
                    <label class="font-bold text-gray-500 text-[10px] uppercase ml-1">Password Keamanan</label>
                    <input type="password" id="adminPass" placeholder="Admin Only" class="w-full p-4 mt-1 border-2 border-gray-100 rounded-xl focus:border-blue-500 outline-none transition-all">
                </div>
                <hr>
                <div>
                    <label class="font-bold text-gray-500 text-[10px] uppercase ml-1">Kategori Arsip</label>
                    <select id="inCat" onchange="toggleNamaField()" class="w-full p-4 mt-1 border-2 border-gray-100 rounded-xl outline-none bg-blue-50 font-bold text-blue-800">
                        <option value="surat-masuk">Surat Masuk</option>
                        <option value="surat-keluar">Surat Keluar</option>
                        <option value="sk">Surat Keputusan</option>
                        <option value="kepegawaian">Kepegawaian</option>
                        <option value="absen">Rekap Absen Pegawai</option>
                    </select>
                </div>
                <div id="fieldNamaPegawai" class="hidden">
                    <label class="font-bold text-gray-500 text-[10px] uppercase ml-1 text-blue-600">Nama Pegawai / Instansi</label>
                    <input type="text" id="inEmployeeName" placeholder="Nama Lengkap / Nama Instansi" class="w-full p-4 mt-1 border-2 border-blue-200 rounded-xl outline-none focus:border-blue-500 bg-blue-50 font-bold">
                </div>
                <div>
                    <label class="font-bold text-gray-500 text-[10px] uppercase ml-1">Judul Dokumen</label>
                    <input type="text" id="inTitle" placeholder="Misal: Absen Guru Januari 2024" class="w-full p-4 mt-1 border-2 border-gray-100 rounded-xl outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="font-bold text-gray-500 text-[10px] uppercase ml-1">Tanggal</label>
                    <input type="text" id="inDate" placeholder="Misal: 31 Januari 2024" class="w-full p-4 mt-1 border-2 border-gray-100 rounded-xl outline-none">
                </div>
                <div>
                    <label class="font-bold text-gray-500 text-[10px] uppercase ml-1">Link File Drive</label>
                    <input type="text" id="inLink" placeholder="Tempel Link Shareable" class="w-full p-4 mt-1 border-2 border-gray-100 rounded-xl outline-none">
                </div>
            </div>
            <div class="mt-8">
                <button id="btnSimpan" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-lg shadow-xl shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all">
                    SIMPAN DATA KE CLOUD
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js';
        import { getFirestore, collection, onSnapshot, query, addDoc, doc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js';
        import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDbP9tX_U3eWKnKUoo6Ukofdi2rlOrxpuM",
            authDomain: "arsip-digital-baru.firebaseapp.com",
            projectId: "arsip-digital-baru",
            storageBucket: "arsip-digital-baru.appspot.com",
            messagingSenderId: "789604072965",
            appId: "1:789604072965:web:42a2c6be8ac330010a666c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let dataSemua = [];
        let kategoriSekarang = 'surat-masuk';
        let filterKata = '';

        async function start() {
            await signInAnonymously(auth);
            onSnapshot(query(collection(db, 'arsip')), (snap) => {
                dataSemua = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render();
                const statusEl = document.getElementById('status');
                statusEl.innerText = "ONLINE";
                statusEl.className = "text-[9px] font-bold bg-green-500 px-2 py-1 rounded-full uppercase shadow-sm";
            });
        }

        window.hapusDokumen = async (id, title) => {
            const pass = prompt(`Ketik password admin untuk menghapus "${title}":`);
            if (pass !== "admin123") return pass === null ? null : alert("Akses Ditolak!");
            if (confirm(`Hapus permanen arsip ini?`)) {
                try { await deleteDoc(doc(db, 'arsip', id)); } 
                catch (e) { alert("Error: " + e.message); }
            }
        };

        function render() {
            const tabelBody = document.getElementById('isi-tabel');
            let filtered = dataSemua.filter(i => i.category === kategoriSekarang);

            if (filterKata) {
                filtered = filtered.filter(i => 
                    (i.title || '').toLowerCase().includes(filterKata.toLowerCase()) || 
                    (i.employeeName || '').toLowerCase().includes(filterKata.toLowerCase())
                );
            }

            const groups = {};
            filtered.forEach(item => {
                let groupName = "Lainnya";
                if (kategoriSekarang === 'kepegawaian' || kategoriSekarang === 'absen') {
                    groupName = item.employeeName || "Pegawai Umum";
                } else {
                    if (item.date && item.date.length > 4) {
                        const parts = item.date.split(' ');
                        groupName = parts.length > 1 ? parts.slice(-2).join(' ') : item.date;
                    } else {
                        groupName = "Arsip Tanpa Tanggal";
                    }
                }
                
                if (!groups[groupName]) groups[groupName] = [];
                groups[groupName].push(item);
            });

            let htmlContent = '';
            const sortedGroups = Object.keys(groups).sort().reverse();

            sortedGroups.forEach(group => {
                htmlContent += `
                    <tr class="group-header">
                        <td colspan="3" class="p-4 pl-6 border-b text-[11px] uppercase tracking-widest bg-blue-100/90 text-blue-900 font-black shadow-sm">
                            <i class="${(kategoriSekarang === 'kepegawaian' || kategoriSekarang === 'absen') ? 'fas fa-id-card' : 'fas fa-calendar-alt'} mr-2 text-blue-600"></i> ${group}
                        </td>
                    </tr>
                `;
                groups[group].forEach(doc => {
                    htmlContent += `
                        <tr class="border-b border-gray-50 hover:bg-gray-50/50 bg-white/95 transition-all">
                            <td class="p-5 pl-10">
                                <a href="${doc.link}" target="_blank" class="judul-link block">
                                    <div class="text-sm font-bold text-gray-700 underline-offset-4 decoration-blue-400">
                                        <i class="far fa-file-pdf mr-2 text-red-500"></i>${doc.title}
                                    </div>
                                    ${doc.employeeName ? `<div class="text-[10px] text-blue-500 font-semibold mt-0.5 ml-6">${doc.employeeName}</div>` : ''}
                                </a>
                            </td>
                            <td class="p-5 text-[10px] text-gray-400 font-bold uppercase tracking-tighter">${doc.date || '-'}</td>
                            <td class="p-5 text-center">
                                <button onclick="hapusDokumen('${doc.id}', '${doc.title}')" class="w-10 h-10 rounded-xl bg-red-50 text-red-400 flex items-center justify-center hover:bg-red-600 hover:text-white transition-all shadow-sm">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            });

            tabelBody.innerHTML = htmlContent || '<tr><td colspan="3" class="p-20 text-center text-gray-400 font-medium">Data tidak ditemukan.</td></tr>';
        }

        document.getElementById('btnSimpan').onclick = async () => {
            const pass = document.getElementById('adminPass').value;
            if(pass !== "admin123") return alert("Password Salah!");
            const docBaru = {
                title: document.getElementById('inTitle').value,
                category: document.getElementById('inCat').value,
                date: document.getElementById('inDate').value,
                link: document.getElementById('inLink').value,
                employeeName: document.getElementById('inEmployeeName').value || ''
            };
            if(!docBaru.title || !docBaru.link) return alert("Data belum lengkap!");
            try {
                await addDoc(collection(db, 'arsip'), docBaru);
                tutupModal();
                document.querySelectorAll('#modalInput input:not([type=password])').forEach(el => el.value = "");
            } catch (e) { alert("Gagal Simpan: " + e.message); }
        };

        document.getElementById('searchTerm').oninput = (e) => {
            filterKata = e.target.value;
            render();
        };

        window.toggleNamaField = () => {
            document.getElementById('fieldNamaPegawai').className = 'block';
        };

        window.bukaModal = () => {
            toggleNamaField();
            document.getElementById('modalInput').classList.remove('hidden');
        };
        
        window.tutupModal = () => document.getElementById('modalInput').classList.add('hidden');
        
        document.getElementById('menu-tab').onclick = (e) => {
            const b = e.target.closest('.btn-tab');
            if(!b) return;
            document.querySelectorAll('.btn-tab').forEach(x => { 
                x.classList.remove('tab-aktif'); 
                x.classList.add('bg-white'); 
            });
            b.classList.add('tab-aktif');
            b.classList.remove('bg-white');
            kategoriSekarang = b.dataset.cat;
            filterKata = '';
            document.getElementById('searchTerm').value = '';
            render();
        };

        start();
    </script>
</body>
</html>
