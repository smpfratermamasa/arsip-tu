<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Arsip Digital - SMP Frater Mamasa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .tab-active { border-bottom: 3px solid #1e40af; color: #1e40af; font-weight: 600; }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%); background-size: 200% 100%; animation: skeleton-loading 1.5s infinite; }
        @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="min-h-screen">
    <div id="app" class="flex flex-col min-h-screen">
        <!-- Navigasi -->
        <nav class="bg-blue-900 text-white shadow-lg sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <div class="flex items-center space-x-3">
                        <div class="bg-white p-1 rounded-full"><i class="fas fa-school text-blue-900 text-xl"></i></div>
                        <div>
                            <h1 class="font-bold text-lg leading-tight uppercase">TU SMP Frater Mamasa</h1>
                            <p class="text-[10px] text-blue-200 tracking-widest uppercase">Arsip Digital Online</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span id="auth-status" class="text-[9px] text-blue-300 uppercase italic font-bold">Menghubungkan...</span>
                        <button onclick="window.toggleAdminLogin()" class="hover:bg-blue-800 p-2 rounded-lg transition" title="Login Admin"><i id="admin-icon" class="fas fa-lock"></i></button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
            <!-- Statistik -->
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center space-x-3">
                    <div class="p-2 bg-blue-100 text-blue-600 rounded-lg"><i class="fas fa-file-import"></i></div>
                    <div><p class="text-[10px] text-gray-400 uppercase font-bold">Masuk</p><h3 id="stat-masuk" class="text-lg font-bold">0</h3></div>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center space-x-3">
                    <div class="p-2 bg-green-100 text-green-600 rounded-lg"><i class="fas fa-file-export"></i></div>
                    <div><p class="text-[10px] text-gray-400 uppercase font-bold">Keluar</p><h3 id="stat-keluar" class="text-lg font-bold">0</h3></div>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center space-x-3">
                    <div class="p-2 bg-purple-100 text-purple-600 rounded-lg"><i class="fas fa-gavel"></i></div>
                    <div><p class="text-[10px] text-gray-400 uppercase font-bold">SK</p><h3 id="stat-sk" class="text-lg font-bold">0</h3></div>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center space-x-3">
                    <div class="p-2 bg-orange-100 text-orange-600 rounded-lg"><i class="fas fa-users"></i></div>
                    <div><p class="text-[10px] text-gray-400 uppercase font-bold">Pegawai</p><h3 id="stat-pegawai" class="text-lg font-bold">0</h3></div>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center space-x-3">
                    <div class="p-2 bg-red-100 text-red-600 rounded-lg"><i class="fas fa-calendar-check"></i></div>
                    <div><p class="text-[10px] text-gray-400 uppercase font-bold">Absen</p><h3 id="stat-absen" class="text-lg font-bold">0</h3></div>
                </div>
            </div>

            <!-- Konten Utama -->
            <div class="bg-white rounded-2xl shadow-md border border-gray-100 overflow-hidden">
                <div class="p-6 border-b flex flex-col md:flex-row justify-between gap-4 items-center">
                    <div class="flex flex-wrap gap-2 text-xs" id="tabs">
                        <button onclick="window.changeCategory('all')" id="tab-all" class="px-3 py-2 tab-active">Semua</button>
                        <button onclick="window.changeCategory('surat-masuk')" id="tab-surat-masuk" class="px-3 py-2 text-gray-500">Masuk</button>
                        <button onclick="window.changeCategory('surat-keluar')" id="tab-surat-keluar" class="px-3 py-2 text-gray-500">Keluar</button>
                        <button onclick="window.changeCategory('sk')" id="tab-sk" class="px-3 py-2 text-gray-500">SK</button>
                        <button onclick="window.changeCategory('kepegawaian')" id="tab-kepegawaian" class="px-3 py-2 text-gray-500">Pegawai</button>
                        <button onclick="window.changeCategory('absen')" id="tab-absen" class="px-3 py-2 text-gray-500">Absen</button>
                    </div>
                    <div class="flex items-center space-x-2 w-full md:w-auto">
                        <div class="relative flex-grow">
                            <i class="fas fa-search absolute left-3 top-3 text-gray-400 text-xs"></i>
                            <input type="text" id="searchInput" onkeyup="window.filterArsip()" placeholder="Cari arsip..." class="w-full border pl-9 pr-4 py-2 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500 border-gray-200">
                        </div>
                        <button id="add-btn" onclick="window.openModal()" class="hidden bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-blue-700 transition">Tambah</button>
                    </div>
                </div>

                <div class="overflow-x-auto min-h-[300px]">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-gray-500 text-[10px] uppercase font-bold tracking-wider">
                            <tr>
                                <th class="px-6 py-4">Tanggal</th>
                                <th class="px-6 py-4">Judul Dokumen</th>
                                <th class="px-6 py-4">Kategori</th>
                                <th class="px-6 py-4">Keterangan</th>
                                <th class="px-6 py-4 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="arsip-table" class="text-sm divide-y divide-gray-50">
                            <!-- Skeleton Rows -->
                            <tr class="skeleton-row">
                                <td class="px-6 py-4"><div class="h-4 w-20 skeleton rounded"></div></td>
                                <td class="px-6 py-4"><div class="h-4 w-40 skeleton rounded"></div></td>
                                <td class="px-6 py-4"><div class="h-4 w-16 skeleton rounded"></div></td>
                                <td class="px-6 py-4"><div class="h-4 w-32 skeleton rounded"></div></td>
                                <td class="px-6 py-4"><div class="h-8 w-8 mx-auto skeleton rounded-full"></div></td>
                            </tr>
                        </tbody>
                    </table>
                    <div id="empty-state" class="hidden p-20 flex flex-col items-center justify-center text-center">
                        <i class="fas fa-wifi text-gray-200 text-5xl mb-4"></i>
                        <p id="empty-text" class="text-sm text-gray-500 font-medium">Memuat data dari server...</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Modals -->
        <div id="admin-modal" class="fixed inset-0 bg-blue-900/40 backdrop-blur-sm hidden z-[100] flex items-center justify-center p-4">
            <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center">
                <h2 class="text-xl font-bold mb-4">Akses Admin</h2>
                <input type="password" id="admin-password" placeholder="Kata Sandi..." class="w-full border-2 border-gray-100 p-3 rounded-2xl mb-6 text-center text-lg outline-none focus:border-blue-500">
                <button onclick="window.verifyAdmin()" class="w-full bg-blue-600 text-white py-3 rounded-2xl font-bold uppercase text-xs">Verifikasi</button>
                <button onclick="window.toggleAdminLogin()" class="mt-4 text-xs text-gray-400">Tutup</button>
            </div>
        </div>

        <div id="form-modal" class="fixed inset-0 bg-blue-900/40 backdrop-blur-sm hidden z-[100] flex items-center justify-center p-4">
            <div class="bg-white rounded-3xl w-full max-w-lg shadow-2xl max-h-[90vh] flex flex-col">
                <div class="p-6 border-b flex justify-between items-center">
                    <h2 class="font-bold">Form Arsip</h2>
                    <button onclick="window.closeModal()" class="text-gray-400"><i class="fas fa-times"></i></button>
                </div>
                <form id="arsip-form" class="p-8 space-y-4 overflow-y-auto">
                    <input type="hidden" id="edit-id">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="date" id="form-date" required class="w-full border p-3 rounded-xl text-sm">
                        <select id="form-category" class="w-full border p-3 rounded-xl text-sm">
                            <option value="surat-masuk">Surat Masuk</option>
                            <option value="surat-keluar">Surat Keluar</option>
                            <option value="sk">SK</option>
                            <option value="kepegawaian">Pegawai</option>
                            <option value="absen">Absen</option>
                        </select>
                    </div>
                    <input type="text" id="form-title" placeholder="Judul Dokumen" required class="w-full border p-3 rounded-xl text-sm">
                    <textarea id="form-desc" placeholder="Keterangan" class="w-full border p-3 rounded-xl text-sm"></textarea>
                    <input type="url" id="form-link" placeholder="Link Google Drive" required class="w-full border p-3 rounded-xl text-sm bg-blue-50">
                    <div class="pt-4 flex space-x-3">
                        <button type="button" onclick="window.closeModal()" class="flex-1 bg-gray-100 py-3 rounded-2xl text-xs font-bold uppercase">Batal</button>
                        <button type="submit" class="flex-[2] bg-blue-600 text-white py-3 rounded-2xl text-xs font-bold uppercase">Simpan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js';
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js';

        // 1. Konfigurasi
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const initialToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let allArsip = [];
        let currentCategory = 'all';
        let isAdmin = false;
        let hasLoadedOnce = false;
        let unsubscribeArsip = null;

        // 2. Fungsi UI
        const updateStatus = (text, isSuccess = true) => {
            const el = document.getElementById('auth-status');
            if (el) {
                el.innerText = text;
                el.className = `text-[9px] uppercase font-bold ${isSuccess ? 'text-green-400' : 'text-red-400'}`;
            }
        };

        const render = () => {
            const tableBody = document.getElementById('arsip-table');
            const emptyState = document.getElementById('empty-state');
            const filtered = currentCategory === 'all' ? allArsip : allArsip.filter(a => a.category === currentCategory);
            
            emptyState.classList.add('hidden');
            if (filtered.length === 0 && hasLoadedOnce) {
                tableBody.innerHTML = '';
                document.getElementById('empty-text').innerText = "Belum ada data arsip";
                emptyState.classList.remove('hidden');
                return;
            }

            if (filtered.length > 0) {
                tableBody.innerHTML = filtered.sort((a,b) => new Date(b.date) - new Date(a.date)).map(a => `
                    <tr class="hover:bg-blue-50/30 transition-colors">
                        <td class="px-6 py-4 text-xs text-gray-400 font-mono">${a.date}</td>
                        <td class="px-6 py-4 font-semibold text-gray-700">${a.title}</td>
                        <td class="px-6 py-4"><span class="bg-blue-50 text-blue-700 text-[9px] px-2 py-1 rounded-md uppercase font-bold tracking-wider">${a.category.replace('-', ' ')}</span></td>
                        <td class="px-6 py-4 text-xs text-gray-500 italic truncate max-w-xs">${a.desc || '-'}</td>
                        <td class="px-6 py-4 text-center">
                            <div class="flex justify-center space-x-2">
                                <a href="${a.link}" target="_blank" class="w-8 h-8 rounded-lg bg-blue-100 text-blue-700 flex items-center justify-center hover:bg-blue-600 hover:text-white transition-all shadow-sm"><i class="fab fa-google-drive"></i></a>
                                ${isAdmin ? `
                                    <button onclick="window.openModal('${a.id}')" class="w-8 h-8 rounded-lg bg-amber-100 text-amber-700 flex items-center justify-center hover:bg-amber-600 hover:text-white transition-all shadow-sm"><i class="fas fa-pen"></i></button>
                                    <button onclick="window.deleteData('${a.id}')" class="w-8 h-8 rounded-lg bg-red-100 text-red-600 flex items-center justify-center hover:bg-red-600 hover:text-white transition-all shadow-sm"><i class="fas fa-trash"></i></button>
                                ` : ''}
                            </div>
                        </td>
                    </tr>
                `).join('');
            }
        };

        const updateStats = () => {
            const count = (c) => allArsip.filter(a => a.category === c).length;
            const map = { masuk: 'surat-masuk', keluar: 'surat-keluar', sk: 'sk', pegawai: 'kepegawaian', absen: 'absen' };
            Object.keys(map).forEach(key => {
                const el = document.getElementById('stat-' + key);
                if (el) el.innerText = count(map[key]);
            });
        };

        // 3. Fungsi Inti Firestore
        const startListening = () => {
            // Mencegah query tanpa auth sesuai aturan Firestore
            if (!auth.currentUser) {
                console.warn("Menunda pemuatan data: Belum terautentikasi");
                return;
            }

            if (unsubscribeArsip) unsubscribeArsip();
            
            // Mengikuti pola jalur yang diwajibkan: artifacts/{appId}/public/data/{collectionName}
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'arsip');
            
            unsubscribeArsip = onSnapshot(colRef, (snapshot) => {
                allArsip = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                hasLoadedOnce = true;
                updateStats();
                render();
            }, (err) => {
                console.error("Firestore Permission/Access Error:", err);
                updateStatus("Akses Ditolak", false);
            });
        };

        // 4. Inisialisasi Sesi (Wajib Await sebelum Firestore)
        const initializeAppSession = async () => {
            try {
                if (initialToken) {
                    await signInWithCustomToken(auth, initialToken);
                } else {
                    await signInAnonymously(auth);
                }
                // Setelah login berhasil, panggil listener
                startListening();
                updateStatus("Online");
            } catch (e) {
                console.error("Auth Fail:", e);
                updateStatus("Koneksi Gagal", false);
            }
        };

        // 5. Lifecycle Handlers
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("User terverifikasi:", user.uid);
                startListening(); // Re-sync jika status berubah
            }
        });

        // Jalankan inisialisasi
        initializeAppSession();

        // 6. Global Helper Functions
        window.toggleAdminLogin = () => document.getElementById('admin-modal').classList.toggle('hidden');
        
        window.verifyAdmin = () => {
            const pass = document.getElementById('admin-password').value;
            if (pass === 'adminfrater') {
                isAdmin = true;
                document.getElementById('add-btn').classList.remove('hidden');
                document.getElementById('admin-icon').className = "fas fa-unlock text-amber-500";
                window.toggleAdminLogin();
                render();
            } else { alert("Sandi salah!"); }
        };

        window.changeCategory = (cat) => {
            currentCategory = cat;
            document.querySelectorAll('#tabs button').forEach(b => b.className = "px-3 py-2 text-gray-500 hover:bg-gray-100 rounded-lg transition-colors");
            document.getElementById('tab-' + cat).className = "px-3 py-2 tab-active";
            render();
        };

        window.openModal = (id = null) => {
            const form = document.getElementById('arsip-form');
            form.reset();
            document.getElementById('edit-id').value = "";
            if (id) {
                const d = allArsip.find(a => a.id === id);
                if (d) {
                    document.getElementById('edit-id').value = id;
                    document.getElementById('form-date').value = d.date;
                    document.getElementById('form-category').value = d.category;
                    document.getElementById('form-title').value = d.title;
                    document.getElementById('form-desc').value = d.desc;
                    document.getElementById('form-link').value = d.link;
                }
            }
            document.getElementById('form-modal').classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('form-modal').classList.add('hidden');

        window.deleteData = async (id) => {
            if (!auth.currentUser) return;
            if (confirm("Hapus arsip ini?")) {
                try { 
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'arsip', id)); 
                } catch (e) { alert("Gagal hapus"); }
            }
        };

        document.getElementById('arsip-form').onsubmit = async (e) => {
            e.preventDefault();
            if (!auth.currentUser) return;

            const id = document.getElementById('edit-id').value;
            const data = {
                date: document.getElementById('form-date').value,
                category: document.getElementById('form-category').value,
                title: document.getElementById('form-title').value,
                desc: document.getElementById('form-desc').value,
                link: document.getElementById('form-link').value,
                updatedAt: serverTimestamp()
            };
            
            try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'arsip');
                if (id) { 
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'arsip', id), data); 
                } else { 
                    await addDoc(colRef, data); 
                }
                window.closeModal();
            } catch (err) { alert("Gagal simpan"); }
        };

        window.filterArsip = () => {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('#arsip-table tr').forEach(r => {
                if (!r.classList.contains('skeleton-row')) {
                    r.style.display = r.innerText.toLowerCase().includes(q) ? "" : "none";
                }
            });
        };
    </script>
</body>
</html>
