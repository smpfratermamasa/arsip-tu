<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARSIP DIGITAL - FRATER MAMASA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #f3f4f6; }
        .tab-aktif { background: #1e3a8a !important; color: white !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .group-header { background-color: #f1f5f9; font-weight: bold; color: #1e3a8a; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="bg-blue-900 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <i class="fas fa-archive text-blue-300"></i>
            <h1 class="font-bold tracking-tight text-sm uppercase">Arsip Digital SMP Frater</h1>
        </div>
        <div id="status" class="text-[9px] font-bold bg-orange-500 px-2 py-1 rounded-full uppercase">MENGHUBUNGKAN...</div>
    </nav>

    <div class="max-w-4xl mx-auto p-4">
        <!-- Filter Kategori -->
        <div class="flex flex-nowrap overflow-x-auto gap-2 mb-4 pb-2 no-scrollbar" id="menu-tab">
            <button data-cat="surat-masuk" class="btn-tab tab-aktif whitespace-nowrap px-4 py-2 rounded-full text-sm font-medium shadow-sm border border-transparent">Surat Masuk</button>
            <button data-cat="surat-keluar" class="btn-tab bg-white whitespace-nowrap px-4 py-2 rounded-full text-sm font-medium shadow-sm border border-gray-200">Surat Keluar</button>
            <button data-cat="sk" class="btn-tab bg-white whitespace-nowrap px-4 py-2 rounded-full text-sm font-medium shadow-sm border border-gray-200">Surat Keputusan</button>
            <button data-cat="kepegawaian" class="btn-tab bg-white whitespace-nowrap px-4 py-2 rounded-full text-sm font-medium shadow-sm border border-gray-200">Kepegawaian</button>
        </div>

        <!-- Fitur Pencarian -->
        <div id="search-container" class="hidden mb-4">
            <div class="relative">
                <i class="fas fa-search absolute left-3 top-3.5 text-gray-400"></i>
                <input type="text" id="searchName" placeholder="Cari Nama Pegawai..." class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
        </div>

        <!-- Tabel -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 text-[11px] uppercase font-bold text-gray-500 tracking-wider">
                    <tr id="head-tabel">
                        <!-- Head dinamis -->
                    </tr>
                </thead>
                <tbody id="isi-tabel"></tbody>
            </table>
        </div>
    </div>

    <!-- Tombol Tambah -->
    <button onclick="bukaModal()" class="fixed bottom-6 right-6 bg-blue-600 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center hover:bg-blue-700 transition-all">
        <i class="fas fa-plus fa-lg"></i>
    </button>

    <!-- Modal Form Input -->
    <div id="modalInput" class="hidden fixed inset-0 bg-black bg-opacity-50 z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                <i class="fas fa-file-upload text-blue-600"></i> Tambah Arsip Baru
            </h2>
            <div class="space-y-3 text-sm">
                <input type="password" id="adminPass" placeholder="Password Admin" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                <hr>
                <div class="font-bold text-gray-600 mb-1 text-xs uppercase">Pilih Kategori:</div>
                <select id="inCat" onchange="toggleNamaField()" class="w-full p-3 border rounded-lg outline-none bg-gray-50 font-bold text-blue-800">
                    <option value="surat-masuk">Surat Masuk</option>
                    <option value="surat-keluar">Surat Keluar</option>
                    <option value="sk">Surat Keputusan</option>
                    <option value="kepegawaian">Kepegawaian</option>
                </select>

                <div id="fieldNamaPegawai" class="hidden">
                    <div class="font-bold text-gray-600 mb-1 text-xs uppercase">Nama Pegawai:</div>
                    <input type="text" id="inEmployeeName" placeholder="Contoh: Bpk. Yohanes, S.Pd" class="w-full p-3 border border-blue-200 rounded-lg outline-none focus:border-blue-500 bg-blue-50">
                </div>

                <div class="font-bold text-gray-600 mb-1 text-xs uppercase">Judul Dokumen:</div>
                <input type="text" id="inTitle" placeholder="Contoh: SK Pengangkatan Guru" class="w-full p-3 border rounded-lg outline-none focus:border-blue-500">
                
                <div class="font-bold text-gray-600 mb-1 text-xs uppercase">Tanggal Dokumen:</div>
                <input type="text" id="inDate" placeholder="Contoh: 15 Mei 2026" class="w-full p-3 border rounded-lg outline-none">
                
                <div class="font-bold text-gray-600 mb-1 text-xs uppercase">Link Google Drive:</div>
                <input type="text" id="inLink" placeholder="Tempel link di sini" class="w-full p-3 border rounded-lg outline-none">
            </div>
            <div class="mt-6 flex gap-3">
                <button onclick="tutupModal()" class="flex-1 py-3 text-gray-500 font-bold">Batal</button>
                <button id="btnSimpan" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg">Simpan Ke Cloud</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js';
        import { getFirestore, collection, onSnapshot, query, addDoc, doc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js';
        import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDbP9tX_U3eWKnKUoo6Ukofdi2rlOrxpuM",
            authDomain: "arsip-digital-baru.firebaseapp.com",
            projectId: "arsip-digital-baru",
            storageBucket: "arsip-digital-baru.appspot.com",
            messagingSenderId: "789604072965",
            appId: "1:789604072965:web:42a2c6be8ac330010a666c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let dataSemua = [];
        let kategoriSekarang = 'surat-masuk';
        let filterNama = '';

        async function start() {
            await signInAnonymously(auth);
            onSnapshot(query(collection(db, 'arsip')), (snap) => {
                dataSemua = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render();
                document.getElementById('status').innerText = "ONLINE";
                document.getElementById('status').className = "text-[9px] font-bold bg-green-500 px-2 py-1 rounded-full uppercase";
            });
        }

        // Fungsi Hapus Dokumen
        window.hapusDokumen = async (id, title) => {
            const pass = prompt(`Ketik password admin untuk menghapus "${title}":`);
            if (pass === null) return; // User cancel
            
            if (pass !== "admin123") {
                alert("Password Salah! Anda tidak memiliki izin untuk menghapus.");
                return;
            }

            if (confirm(`Apakah Anda yakin ingin menghapus dokumen "${title}" secara permanen?`)) {
                try {
                    await deleteDoc(doc(db, 'arsip', id));
                    alert("Dokumen berhasil dihapus!");
                } catch (e) {
                    alert("Gagal menghapus: " + e.message);
                }
            }
        };

        function render() {
            const isPegawai = kategoriSekarang === 'kepegawaian';
            const headTabel = document.getElementById('head-tabel');
            const searchContainer = document.getElementById('search-container');
            const tabelBody = document.getElementById('isi-tabel');
            
            searchContainer.className = isPegawai ? 'block mb-4' : 'hidden';

            // 1. Render Header
            headTabel.innerHTML = isPegawai ? 
                `<th class="p-4 border-b">Nama Pegawai / Dokumen</th><th class="p-4 border-b">Tanggal</th><th class="p-4 border-b text-center">Aksi</th>` : 
                `<th class="p-4 border-b">Tanggal</th><th class="p-4 border-b">Judul Dokumen</th><th class="p-4 border-b text-center">Aksi</th>`;

            // 2. Filter Data Awal
            let filtered = dataSemua.filter(i => i.category === kategoriSekarang);

            if (!isPegawai) {
                // Tampilan Standar
                tabelBody.innerHTML = filtered.length ? filtered.map(i => `
                    <tr class="border-b hover:bg-blue-50 transition-all">
                        <td class="p-4 text-xs text-gray-500">${i.date || '-'}</td>
                        <td class="p-4 text-sm font-semibold">${i.title}</td>
                        <td class="p-4 text-center">
                            <div class="flex justify-center gap-3">
                                <a href="${i.link}" target="_blank" class="text-blue-600 hover:scale-110 transition-transform"><i class="fab fa-google-drive fa-lg"></i></a>
                                <button onclick="hapusDokumen('${i.id}', '${i.title}')" class="text-red-500 hover:scale-110 transition-transform">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </td>
                    </tr>`).join('') : '<tr><td colspan="3" class="p-10 text-center text-gray-400">Belum ada data.</td></tr>';
            } else {
                // LOGIKA GROUPING UNTUK KEPEGAWAIAN
                if (filterNama) {
                    filtered = filtered.filter(i => (i.employeeName || '').toLowerCase().includes(filterNama.toLowerCase()));
                }

                // Kelompokkan data berdasarkan nama
                const groups = {};
                filtered.forEach(item => {
                    const name = item.employeeName || "Tanpa Nama";
                    if (!groups[name]) groups[name] = [];
                    groups[name].push(item);
                });

                let htmlContent = '';
                const sortedNames = Object.keys(groups).sort();

                if (sortedNames.length === 0) {
                    htmlContent = '<tr><td colspan="3" class="p-10 text-center text-gray-400">Data tidak ditemukan.</td></tr>';
                } else {
                    sortedNames.forEach(name => {
                        // Header Baris Nama Pegawai
                        htmlContent += `
                            <tr class="group-header">
                                <td colspan="3" class="p-3 pl-4 border-b text-sm uppercase tracking-wider bg-blue-50 text-blue-900 font-bold">
                                    <i class="fas fa-user-tie mr-2"></i> ${name} (${groups[name].length} Dokumen)
                                </td>
                            </tr>
                        `;
                        // Sub-baris Dokumen
                        groups[name].forEach(doc => {
                            htmlContent += `
                                <tr class="border-b hover:bg-white bg-white">
                                    <td class="p-4 pl-10 text-sm font-medium text-gray-700">
                                        <i class="far fa-file-alt mr-2 text-gray-400"></i> ${doc.title}
                                    </td>
                                    <td class="p-4 text-xs text-gray-500">${doc.date || '-'}</td>
                                    <td class="p-4 text-center">
                                        <div class="flex justify-center gap-3">
                                            <a href="${doc.link}" target="_blank" class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-blue-100 text-blue-600 hover:bg-blue-600 hover:text-white transition-all shadow-sm">
                                                <i class="fab fa-google-drive"></i>
                                            </a>
                                            <button onclick="hapusDokumen('${doc.id}', '${doc.title}')" class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-red-100 text-red-600 hover:bg-red-600 hover:text-white transition-all shadow-sm">
                                                <i class="fas fa-trash-alt"></i>
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            `;
                        });
                    });
                }
                tabelBody.innerHTML = htmlContent;
            }
        }

        document.getElementById('btnSimpan').onclick = async () => {
            const pass = document.getElementById('adminPass').value;
            if(pass !== "admin123") return alert("Password Salah!");

            const docBaru = {
                title: document.getElementById('inTitle').value,
                category: document.getElementById('inCat').value,
                date: document.getElementById('inDate').value,
                link: document.getElementById('inLink').value,
                employeeName: document.getElementById('inEmployeeName').value || ''
            };

            if(!docBaru.title || !docBaru.link) return alert("Judul dan Link wajib diisi!");

            try {
                await addDoc(collection(db, 'arsip'), docBaru);
                alert("Berhasil disimpan!");
                tutupModal();
                document.getElementById('inTitle').value = "";
                document.getElementById('inEmployeeName').value = "";
                document.getElementById('inDate').value = "";
                document.getElementById('inLink').value = "";
            } catch (e) { alert("Gagal: " + e.message); }
        };

        document.getElementById('searchName').oninput = (e) => {
            filterNama = e.target.value;
            render();
        };

        window.toggleNamaField = () => {
            const cat = document.getElementById('inCat').value;
            document.getElementById('fieldNamaPegawai').className = (cat === 'kepegawaian') ? 'block' : 'hidden';
        };

        window.bukaModal = () => {
            document.getElementById('modalInput').classList.remove('hidden');
            toggleNamaField();
        };
        
        window.tutupModal = () => document.getElementById('modalInput').classList.add('hidden');
        
        document.getElementById('menu-tab').onclick = (e) => {
            const b = e.target.closest('.btn-tab');
            if(!b) return;
            document.querySelectorAll('.btn-tab').forEach(x => x.classList.replace('tab-aktif', 'bg-white'));
            b.classList.add('tab-aktif');
            kategoriSekarang = b.dataset.cat;
            filterNama = '';
            document.getElementById('searchName').value = '';
            render();
        };

        start();
    </script>
</body>
</html>
